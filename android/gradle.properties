org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Workaround: Kotlin incremental compilation's path-relativization crashes when
# the project path contains a space and spans drives from the pub-cache
# (e.g. "D:\fluttter project\cardwallet" vs "C:\...\Pub\Cache\..."). Disabling
# incremental compilation avoids the buggy relativeTo() call entirely.
kotlin.incremental=false
