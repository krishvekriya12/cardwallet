name: cardwallet
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^17.3.0
  connectivity_plus: ^7.2.0
  http: ^1.3.0
  sqflite_sqlcipher: ^3.1.0+1
  path: ^1.9.1
  nfc_manager: ^3.3.0
  camera: ^0.10.6
  cunning_document_scanner: ^1.2.3
  google_mlkit_text_recognition: ^0.15.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  permission_handler: ^11.4.0
  flutter_sms_inbox: ^1.0.5
  image_picker: ^1.1.2
  path_provider: ^2.1.6
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  flutter_svg: ^2.2.1
  share_plus: ^12.0.2
  google_mobile_ads: ^9.0.0
  archive: ^4.0.9
  cryptography: ^2.9.0
  file_picker: ^11.0.2
  expressive_loading_indicator: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/brands/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat_thin.ttf
          weight: 100
        - asset: assets/fonts/montserrat_extra_light.ttf
          weight: 200
        - asset: assets/fonts/montserrat_light.ttf
          weight: 300
        - asset: assets/fonts/montserrat_regular.ttf
          weight: 400
        - asset: assets/fonts/montserrat_italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/montserrat_medium.ttf
          weight: 500
        - asset: assets/fonts/montserrat_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/montserrat_bold.ttf
          weight: 700
        - asset: assets/fonts/montserrat_extra_bold.ttf
          weight: 800
        - asset: assets/fonts/montserrat_black.ttf
          weight: 900
